<div class="person-responsible-report-container">

	@if (loading) {
		<mat-progress-spinner mode="indeterminate"></mat-progress-spinner>
	} @else {

		<table mat-table [dataSource]="dataSource" class="mat-elevation-z8">

			<ng-container matColumnDef="personResponsible">
				<th mat-header-cell *matHeaderCellDef> Person Responsible </th>
				<td mat-cell *matCellDef="let element"> {{ element.personResponsible }} </td>
			</ng-container>

			<ng-container matColumnDef="totalDurationMinutes">
				<th mat-header-cell *matHeaderCellDef> Total Duration (min) </th>
				<td mat-cell *matCellDef="let element"> {{ element.totalDurationMinutes }} </td>
			</ng-container>

			<ng-container matColumnDef="partnerCount">
				<th mat-header-cell *matHeaderCellDef> Partner Count </th>
				<td mat-cell *matCellDef="let element"> {{ element.partnerCount }} </td>
			</ng-container>

			<tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
			<tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
		</table>

		<mat-paginator [length]="totalElements" [pageSize]="pageSize" [pageSizeOptions]="[5,10,25]" (page)="onPage($event)"></mat-paginator>
	}

</div>
