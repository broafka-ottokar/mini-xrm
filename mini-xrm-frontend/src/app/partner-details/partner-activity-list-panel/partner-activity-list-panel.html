<div class="partner-activity-list-container">
	<mat-progress-spinner *ngIf="loading" mode="indeterminate"></mat-progress-spinner>

	<table mat-table [dataSource]="dataSource" class="mat-elevation-z8" *ngIf="!loading">

		<ng-container matColumnDef="subject">
			<th mat-header-cell *matHeaderCellDef> Subject </th>
			<td mat-cell *matCellDef="let element"> {{ element.subject }} </td>
		</ng-container>

		<ng-container matColumnDef="type">
			<th mat-header-cell *matHeaderCellDef> Type </th>
			<td mat-cell *matCellDef="let element"> {{ element.type }} </td>
		</ng-container>

		<ng-container matColumnDef="durationMinutes">
			<th mat-header-cell *matHeaderCellDef> Duration (min) </th>
			<td mat-cell *matCellDef="let element"> {{ element.durationMinutes }} </td>
		</ng-container>

		<ng-container matColumnDef="personResponsible">
			<th mat-header-cell *matHeaderCellDef> Person Responsible </th>
			<td mat-cell *matCellDef="let element"> {{ element.personResponsible }} </td>
		</ng-container>

		<tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
		<tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
	</table>

	<mat-paginator [length]="totalElements" [pageSize]="pageSize" [pageSizeOptions]="[5,10,25]" (page)="onPage($event)" *ngIf="!loading"></mat-paginator>

</div>
