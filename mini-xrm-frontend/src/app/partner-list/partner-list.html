<div class="partner-list-container">
	<mat-progress-spinner *ngIf="loading" mode="indeterminate"></mat-progress-spinner>

	<table mat-table [dataSource]="dataSource" class="mat-elevation-z8" *ngIf="!loading">

    

		<ng-container matColumnDef="name">
			<th mat-header-cell *matHeaderCellDef> Name </th>
			<td mat-cell *matCellDef="let element">
				<a [routerLink]="['/partner-details', element.id]">{{ element.name }}</a>
			</td>
		</ng-container>

		<ng-container matColumnDef="headquarters">
			<th mat-header-cell *matHeaderCellDef> Headquarters </th>
			<td mat-cell *matCellDef="let element"> {{element.headquarters}} </td>
		</ng-container>

		<ng-container matColumnDef="status">
			<th mat-header-cell *matHeaderCellDef> Status </th>
			<td mat-cell *matCellDef="let element"> {{ statusLabel(element.status) }} </td>
		</ng-container>

		<ng-container matColumnDef="tags">
			<th mat-header-cell *matHeaderCellDef> Tags </th>
			<td mat-cell *matCellDef="let element">
				<mat-chip-set>
					<mat-chip *ngFor="let t of element.tags">{{t.name}}</mat-chip>
				</mat-chip-set>
			</td>
		</ng-container>

		<ng-container matColumnDef="actions">
			<th mat-header-cell *matHeaderCellDef></th>
			<td mat-cell *matCellDef="let element" class="actions-cell">
				<span class="action-placeholder">...</span>
				<span class="action-buttons" aria-hidden="true">
					<button class="action-btn modify" [routerLink]="['/partner', element.id]">Modify</button>
					<button class="action-btn delete" (click)="delete(element)">Delete</button>
				</span>
			</td>
		</ng-container>

		<tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
		<tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
	</table>

	<mat-paginator [length]="totalElements" [pageSize]="pageSize" [pageSizeOptions]="[5,10,25]" (page)="onPage($event)" *ngIf="!loading"></mat-paginator>
</div>
